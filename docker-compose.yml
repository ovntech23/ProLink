version: '3.8'
services:
  postgres:
    image: postgres:alpine
    container_name: prolink-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=prolink
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: prolink-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prolink-backend
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    environment:
      - MONGODB_URI=postgresql://admin:password@postgres:5432/prolink
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - PORT=5000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prolink-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  postgres_data:
